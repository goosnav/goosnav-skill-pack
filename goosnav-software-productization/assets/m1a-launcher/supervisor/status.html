<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Starting application</title>
<style>
  :root { color-scheme: light dark; font: 16px/1.5 system-ui, sans-serif; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #f9fafb; }
  main { width: min(34rem, calc(100% - 2rem)); padding: 2rem; border-radius: 1rem; background: #1f2937; box-shadow: 0 1rem 3rem #0008; }
  h1 { margin-top: 0; font-size: 1.5rem; }
  #code { color: #fca5a5; font-weight: 700; }
  #log { color: #9ca3af; overflow-wrap: anywhere; font-size: .875rem; }
  button { display: none; border: 0; border-radius: .5rem; padding: .7rem 1rem; font: inherit; font-weight: 700; cursor: pointer; }
  #copy { margin-left: .5rem; }
  .pulse { width: .75rem; height: .75rem; display: inline-block; border-radius: 50%; margin-right: .5rem; background: #60a5fa; animation: pulse 1s infinite alternate; }
  @keyframes pulse { to { opacity: .25; } }
</style>
<main>
  <h1><span class="pulse"></span><span id="stage">Starting</span></h1>
  <p id="message">Preparing the application.</p>
  <p id="code"></p>
  <p id="log"></p>
  <button id="retry" type="button">Retry</button>
  <button id="copy" type="button">Copy diagnostics</button>
</main>
<script>
const stage = document.querySelector('#stage'), message = document.querySelector('#message');
const code = document.querySelector('#code'), log = document.querySelector('#log');
const retry = document.querySelector('#retry'), copy = document.querySelector('#copy');
let retryToken = '', diagnostics = '';
async function refresh() {
  try {
    const response = await fetch('/api/status', {cache: 'no-store'}), status = await response.json();
    stage.textContent = status.stage; message.textContent = status.message; code.textContent = status.error_code || '';
    log.textContent = status.log_path ? `Log: ${status.log_path}` : '';
    retry.style.display = status.retryable ? 'inline-block' : 'none';
    copy.style.display = status.error_code ? 'inline-block' : 'none';
    retryToken = status.retry_token || '';
    diagnostics = [status.error_code, status.message, status.log_path].filter(Boolean).join('\n');
    if (status.ready_url) location.replace(status.ready_url);
  } catch (_) {}
}
retry.addEventListener('click', async () => {
  retry.disabled = true;
  await fetch('/api/retry', {method: 'POST', headers: {'X-Goosnav-Retry': retryToken}});
  retry.disabled = false;
});
copy.addEventListener('click', async () => { await navigator.clipboard.writeText(diagnostics); });
setInterval(refresh, 500); refresh();
</script>
</html>
